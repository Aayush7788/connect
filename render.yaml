services:
  - type: web
    name: connect-api-staging
    runtime: docker
    region: singapore
    plan: starter
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    healthCheckPath: /health
    preDeployCommand: python -m alembic -c database/alembic.ini upgrade head
    envVars:
      - key: APP_ENV
        value: staging
      - key: LOG_LEVEL
        value: info
      - key: ENABLE_DEBUG_ERRORS
        value: "false"
      - key: API_V1_PREFIX
        value: /v1
      - key: CONTACT_REVEAL_MODE
        value: free_unlimited
      - key: AUTH_CONTEXT_CACHE_SECONDS
        value: "15"
      - key: SUPABASE_JWKS_CACHE_SECONDS
        value: "600"
      - key: SUPABASE_JWT_LEEWAY_SECONDS
        value: "30"
      - key: MAX_UPLOAD_MB
        value: "10"
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_PUBLIC_MEDIA_BUCKET
        value: public-media
      - key: SUPABASE_PRIVATE_VERIFICATION_BUCKET
        value: verification-documents
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: SHARE_BASE_URL
        sync: false
