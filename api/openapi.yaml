      type: object
      required: [user, next_state]
      properties:
        user:
          $ref: '#/components/schemas/User'
        next_state:
          type: string
          enum: [complete_basic_account, role_selection_required, home, account_blocked]
        profile:
          $ref: '#/components/schemas/ProfileSummary'
        unread_notification_count:
          type: integer
        allowed_actions:
          type: array
          items:
            type: string
    ProfileSummary:
