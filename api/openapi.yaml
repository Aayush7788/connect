openapi: 3.1.0
info:
  title: Textile Marketplace MVP API
  version: 0.1.0
  description: Android-first private MVP backend API draft for the textile marketplace.
servers:
  - url: https://api.example.com/v1
    description: Production placeholder
  - url: http://127.0.0.1:8000/v1
    description: Local FastAPI development server
security:
  - bearerAuth: []
tags:
  - name: Auth
  - name: Me
  - name: Taxonomy
  - name: Search
  - name: Profiles
  - name: WorkCards
  - name: WorkNeededPosts
  - name: Media
  - name: Verification
  - name: Saved
  - name: Reports
  - name: Notifications
  - name: Settings
  - name: Contact
  - name: Share
  - name: Admin
paths:
  /auth/otp/request:
    post:
      tags: [Auth]
      security: []
      summary: Request mobile OTP
      operationId: requestOtp
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OtpRequest'
      responses:
        '200':
          description: OTP request accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OtpRequestResponse'
        default:
          $ref: '#/components/responses/Error'
  /auth/otp/verify:
    post:
      tags: [Auth]
      security: []
      summary: Verify OTP and create or resume session
      operationId: verifyOtp
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OtpVerifyRequest'
      responses:
        '200':
          description: OTP verified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSessionResponse'
        default:
          $ref: '#/components/responses/Error'
  /auth/account:
    post:
      tags: [Auth]
      summary: Complete basic account after OTP
      operationId: completeBasicAccount
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BasicAccountRequest'
      responses:
        '200':
          description: Account updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeResponse'
        default:
          $ref: '#/components/responses/Error'
  /auth/role/confirm:
    post:
      tags: [Auth]
      summary: Confirm immutable user role and create profile shell
      operationId: confirmRole
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role]
              properties:
                role:
                  $ref: '#/components/schemas/UserRole'
      responses:
        '200':
          description: Role confirmed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeResponse'
        default:
          $ref: '#/components/responses/Error'
  /auth/logout:
    post:
      tags: [Auth]
      summary: Logout current device/session
      operationId: logout
      responses:
        '204':
          description: Logged out
        default:
          $ref: '#/components/responses/Error'
  /me:
    get:
      tags: [Me]
      summary: Bootstrap current user app state
      operationId: getMe
      responses:
        '200':
          description: Current user state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeResponse'
        default:
          $ref: '#/components/responses/Error'
  /taxonomy/categories:
    get:
      tags: [Taxonomy]
      summary: List active categories for profile and marketplace forms
      operationId: listCategories
      parameters:
        - name: category_type
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/CategoryType'
        - name: parent_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Active categories
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryListResponse'
        default:
          $ref: '#/components/responses/Error'
  /me/profile:
    get:
      tags: [Me]
      summary: Get owner profile with private owner state
      operationId: getMyProfile
      responses:
        '200':
          description: Owner profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OwnerProfileResponse'
        default:
          $ref: '#/components/responses/Error'
    patch:
      tags: [Me]
      summary: Update owner profile fields
      operationId: updateMyProfile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProfileUpdateRequest'
      responses:
        '200':
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OwnerProfileResponse'
        default:
          $ref: '#/components/responses/Error'
  /me/profile/complete:
    post:
      tags: [Me]
      summary: Complete and publish own profile
      operationId: completeMyProfile
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '200':
          description: Profile completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OwnerProfileResponse'
        default:
          $ref: '#/components/responses/Error'
  /me/profile/hide:
    post:
      tags: [Me]
      summary: Hide own profile from discovery
      operationId: hideMyProfile
      responses:
        '200':
          description: Profile hidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OwnerProfileResponse'
        default:
          $ref: '#/components/responses/Error'
  /me/profile/show:
    post:
      tags: [Me]
      summary: Restore own profile to discovery if eligible
      operationId: showMyProfile
      responses:
        '200':
          description: Profile shown
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OwnerProfileResponse'
        default:
          $ref: '#/components/responses/Error'
  /search:
    get:
      tags: [Search]
      summary: Search marketplace objects
      operationId: searchMarketplace
      parameters:
        - name: target
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/SearchTarget'
        - name: q
          in: query
          required: false
          schema:
            type: string
        - name: business_mode
          in: query
          required: false
          schema:
            type: string
            enum: [work_needed_posts, profiles]
        - name: category_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: product_type_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: locality
          in: query
          required: false
          schema:
            type: string
        - name: verified_only
          in: query
          required: false
          schema:
            type: boolean
        - name: min_experience_years
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            maximum: 100
        - name: max_experience_years
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            maximum: 100
        - name: sort
          in: query
          required: false
          schema:
            type: string
            enum: [best, verified_first, nearby, most_photos, recent]
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResponse'
        default:
          $ref: '#/components/responses/Error'
  /profiles/{profile_id}:
    get:
      tags: [Profiles]
      summary: Get public profile detail and record contact reveal in free MVP
      operationId: getProfileDetail
      parameters:
        - $ref: '#/components/parameters/ProfileId'
        - name: source_type
          in: query
          required: false
          schema:
            type: string
            enum: [work_card, work_needed_post, profile]
        - name: source_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Public profile detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicProfileDetail'
        default:
          $ref: '#/components/responses/Error'
  /me/work-cards:
    get:
      tags: [WorkCards]
      summary: List own work cards
      operationId: listMyWorkCards
      responses:
        '200':
          description: Work cards
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/WorkCard'
        default:
          $ref: '#/components/responses/Error'
    post:
      tags: [WorkCards]
      summary: Create own work card draft
      operationId: createWorkCard
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkCardUpsertRequest'
      responses:
        '201':
          description: Work card created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkCard'
        default:
          $ref: '#/components/responses/Error'
  /me/work-cards/{work_card_id}:
    patch:
      tags: [WorkCards]
      summary: Update own work card
      operationId: updateWorkCard
      parameters:
        - $ref: '#/components/parameters/WorkCardId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkCardUpsertRequest'
      responses:
        '200':
          description: Updated work card
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkCard'
        default:
          $ref: '#/components/responses/Error'
    delete:
      tags: [WorkCards]
      summary: Soft delete own work card
      operationId: deleteWorkCard
      parameters:
        - $ref: '#/components/parameters/WorkCardId'
      responses:
        '204':
          description: Deleted
        default:
          $ref: '#/components/responses/Error'
  /me/work-cards/{work_card_id}/publish:
    post:
      tags: [WorkCards]
      summary: Publish own work card
      operationId: publishWorkCard
      parameters:
        - $ref: '#/components/parameters/WorkCardId'
      responses:
        '200':
          description: Published work card
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkCard'
        default:
          $ref: '#/components/responses/Error'
  /me/work-cards/{work_card_id}/hide:
    post:
      tags: [WorkCards]
      summary: Hide own work card
      operationId: hideWorkCard
      parameters:
        - $ref: '#/components/parameters/WorkCardId'
      responses:
        '200':
          description: Hidden work card
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkCard'
        default:
          $ref: '#/components/responses/Error'
  /me/work-cards/{work_card_id}/show:
    post:
      tags: [WorkCards]
      summary: Show own hidden work card
      operationId: showWorkCard
      parameters:
        - $ref: '#/components/parameters/WorkCardId'
      responses:
        '200':
          description: Shown work card
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkCard'
        default:
          $ref: '#/components/responses/Error'
  /me/work-needed-posts:
    get:
      tags: [WorkNeededPosts]
      summary: List own work-needed posts
      operationId: listMyWorkNeededPosts
      responses:
        '200':
          description: Work-needed posts
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/WorkNeededPost'
        default:
          $ref: '#/components/responses/Error'
    post:
      tags: [WorkNeededPosts]
      summary: Create own work-needed post draft
      operationId: createWorkNeededPost
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkNeededPostUpsertRequest'
      responses:
        '201':
          description: Work-needed post created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkNeededPost'
        default:
          $ref: '#/components/responses/Error'
  /me/work-needed-posts/{post_id}:
    patch:
      tags: [WorkNeededPosts]
      summary: Update own work-needed post
      operationId: updateWorkNeededPost
      parameters:
        - $ref: '#/components/parameters/PostId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkNeededPostUpsertRequest'
      responses:
        '200':
          description: Updated work-needed post
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkNeededPost'
        default:
          $ref: '#/components/responses/Error'
    delete:
      tags: [WorkNeededPosts]
      summary: Soft delete own work-needed post
      operationId: deleteWorkNeededPost
      parameters:
        - $ref: '#/components/parameters/PostId'
      responses:
        '204':
          description: Deleted
        default:
          $ref: '#/components/responses/Error'
  /me/work-needed-posts/{post_id}/publish:
    post:
      tags: [WorkNeededPosts]
      summary: Publish own work-needed post as active
      operationId: publishWorkNeededPost
      parameters:
        - $ref: '#/components/parameters/PostId'
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '200':
          description: Active work-needed post
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkNeededPost'
        default:
          $ref: '#/components/responses/Error'
  /me/work-needed-posts/{post_id}/pause:
    post:
      tags: [WorkNeededPosts]
      summary: Pause own active work-needed post
      operationId: pauseWorkNeededPost
      parameters:
        - $ref: '#/components/parameters/PostId'
      responses:
        '200':
          description: Paused work-needed post
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkNeededPost'
        default:
          $ref: '#/components/responses/Error'
  /me/work-needed-posts/{post_id}/resume:
    post:
      tags: [WorkNeededPosts]
      summary: Resume own paused work-needed post
      operationId: resumeWorkNeededPost
      parameters:
        - $ref: '#/components/parameters/PostId'
      responses:
        '200':
          description: Active work-needed post
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkNeededPost'
        default:
          $ref: '#/components/responses/Error'
  /me/work-needed-posts/{post_id}/close:
    post:
      tags: [WorkNeededPosts]
      summary: Close own work-needed post
      operationId: closeWorkNeededPost
      parameters:
        - $ref: '#/components/parameters/PostId'
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '200':
          description: Closed work-needed post
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkNeededPost'
        default:
          $ref: '#/components/responses/Error'
  /media/upload-intent:
    post:
      tags: [Media]
      summary: Create backend-authorized upload intent
      operationId: createUploadIntent
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UploadIntentRequest'
      responses:
        '201':
          description: Upload intent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadIntentResponse'
        default:
          $ref: '#/components/responses/Error'
  /media/{media_asset_id}/complete:
    post:
      tags: [Media]
      summary: Mark upload complete after backend verification
      operationId: completeMediaUpload
      parameters:
        - $ref: '#/components/parameters/MediaAssetId'
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '200':
          description: Media ready or processing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MediaAsset'
        default:
          $ref: '#/components/responses/Error'
  /media/{media_asset_id}/retry:
    post:
      tags: [Media]
      summary: Retry pending or failed media upload
      operationId: retryMediaUpload
      parameters:
        - $ref: '#/components/parameters/MediaAssetId'
      responses:
        '200':
          description: Retry upload intent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadIntentResponse'
        default:
          $ref: '#/components/responses/Error'
  /media/{media_asset_id}/cancel:
    post:
      tags: [Media]
      summary: Cancel pending media upload
      operationId: cancelMediaUpload
      parameters:
        - $ref: '#/components/parameters/MediaAssetId'
      responses:
        '204':
          description: Cancelled
        default:
          $ref: '#/components/responses/Error'
  /media/{media_asset_id}:
    delete:
      tags: [Media]
      summary: Delete media if minimum photo rules allow
      operationId: deleteMedia
      parameters:
        - $ref: '#/components/parameters/MediaAssetId'
      responses:
        '204':
          description: Deleted
        default:
          $ref: '#/components/responses/Error'
  /me/verification:
    get:
      tags: [Verification]
      summary: Get own verification summary
      operationId: getMyVerification
      responses:
        '200':
          description: Verification summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerificationSummary'
        default:
          $ref: '#/components/responses/Error'
  /me/verification/submit:
    post:
      tags: [Verification]
      summary: Submit profile for manual verification
      operationId: submitVerification
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '201':
          description: Verification case created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerificationSummary'
        default:
          $ref: '#/components/responses/Error'
  /me/verification/resubmit:
    post:
      tags: [Verification]
      summary: Resubmit changes-requested verification case
      operationId: resubmitVerification
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '200':
          description: Verification resubmitted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerificationSummary'
        default:
          $ref: '#/components/responses/Error'
  /me/saved-items:
    get:
      tags: [Saved]
      summary: List saved items
      operationId: listSavedItems
      parameters:
        - name: target_type
          in: query
          schema:
            $ref: '#/components/schemas/SavedTargetType'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Saved items
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SavedItemsResponse'
        default:
          $ref: '#/components/responses/Error'
    post:
      tags: [Saved]
      summary: Save a profile, work card, or work-needed post
      operationId: saveItem
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SaveItemRequest'
      responses:
        '200':
          description: Saved item
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SavedItem'
        default:
          $ref: '#/components/responses/Error'
  /me/saved-items/{saved_item_id}:
    delete:
      tags: [Saved]
      summary: Remove saved item
      operationId: removeSavedItem
      parameters:
        - name: saved_item_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Removed
        default:
          $ref: '#/components/responses/Error'
  /reports:
    post:
      tags: [Reports]
      summary: Submit report
      operationId: createReport
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateReportRequest'
      responses:
        '201':
          description: Report submitted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Report'
        default:
          $ref: '#/components/responses/Error'
  /me/notifications:
    get:
      tags: [Notifications]
      summary: List in-app notifications
      operationId: listNotifications
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Notifications
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationsResponse'
        default:
          $ref: '#/components/responses/Error'
  /me/notifications/{notification_id}/read:
    post:
      tags: [Notifications]
      summary: Mark notification read
      operationId: markNotificationRead
      parameters:
        - name: notification_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Notification
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Notification'
        default:
          $ref: '#/components/responses/Error'
  /me/device-tokens:
    post:
      tags: [Notifications]
      summary: Register Android FCM token
      operationId: registerDeviceToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterDeviceTokenRequest'
      responses:
        '204':
          description: Registered
        default:
          $ref: '#/components/responses/Error'
  /me/settings:
    patch:
      tags: [Settings]
      summary: Update own settings
      operationId: updateSettings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSettingsRequest'
      responses:
        '200':
          description: Settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSettings'
        default:
          $ref: '#/components/responses/Error'
  /contact-actions:
    post:
      tags: [Contact]
      summary: Log contact action
      operationId: createContactAction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContactActionRequest'
      responses:
        '202':
          description: Accepted
        default:
          $ref: '#/components/responses/Error'
  /share-links:
    post:
      tags: [Share]
      summary: Create canonical share link and log share event
      operationId: createShareLink
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateShareLinkRequest'
      responses:
        '200':
          description: Share link
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShareLinkResponse'
        default:
          $ref: '#/components/responses/Error'
  /admin/me:
    get:
      tags: [Admin]
      summary: Get admin session
      operationId: getAdminMe
      responses:
        '200':
          description: Admin user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminUser'
        default:
          $ref: '#/components/responses/Error'
  /admin/verification-cases:
    get:
      tags: [Admin]
      summary: List verification cases
      operationId: adminListVerificationCases
      parameters:
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/VerificationCaseStatus'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Verification case list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminVerificationCasesResponse'
        default:
          $ref: '#/components/responses/Error'
  /admin/verification-cases/{case_id}:
    get:
      tags: [Admin]
      summary: Get verification case detail
      operationId: adminGetVerificationCase
      parameters:
        - $ref: '#/components/parameters/CaseId'
      responses:
        '200':
          description: Verification case detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminVerificationCase'
        default:
          $ref: '#/components/responses/Error'
  /admin/verification-cases/{case_id}/approve:
    post:
      tags: [Admin]
      summary: Approve verification case
      operationId: adminApproveVerificationCase
      parameters:
        - $ref: '#/components/parameters/CaseId'
      requestBody:
        $ref: '#/components/requestBodies/AdminDecision'
      responses:
        '200':
          description: Approved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminVerificationCase'
        default:
          $ref: '#/components/responses/Error'
  /admin/verification-cases/{case_id}/request-changes:
    post:
      tags: [Admin]
      summary: Request verification changes
      operationId: adminRequestVerificationChanges
      parameters:
        - $ref: '#/components/parameters/CaseId'
      requestBody:
        $ref: '#/components/requestBodies/AdminDecision'
      responses:
        '200':
          description: Changes requested
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminVerificationCase'
        default:
          $ref: '#/components/responses/Error'
  /admin/verification-cases/{case_id}/reject:
    post:
      tags: [Admin]
      summary: Reject verification case
      operationId: adminRejectVerificationCase
      parameters:
        - $ref: '#/components/parameters/CaseId'
      requestBody:
        $ref: '#/components/requestBodies/AdminDecision'
      responses:
        '200':
          description: Rejected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminVerificationCase'
        default:
          $ref: '#/components/responses/Error'
  /admin/profiles:
    get:
      tags: [Admin]
      summary: List profiles for admin
      operationId: adminListProfiles
      parameters:
        - name: role
          in: query
          schema:
            $ref: '#/components/schemas/UserRole'
        - name: verification_status
          in: query
          schema:
            $ref: '#/components/schemas/VerificationStatus'
        - name: is_admin_seeded
          in: query
          schema:
            type: boolean
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Admin profile list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminProfilesResponse'
        default:
          $ref: '#/components/responses/Error'
  /admin/seed-profiles:
    post:
      tags: [Admin]
      summary: Create admin-seeded profile
      operationId: adminCreateSeedProfile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminSeedProfileRequest'
      responses:
        '201':
          description: Seed profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminProfile'
        default:
          $ref: '#/components/responses/Error'
  /admin/profiles/{profile_id}/suspend:
    post:
      tags: [Admin]
      summary: Suspend profile and account where applicable
      operationId: adminSuspendProfile
      parameters:
        - $ref: '#/components/parameters/ProfileId'
      requestBody:
        $ref: '#/components/requestBodies/AdminDecision'
      responses:
        '200':
          description: Suspended
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminProfile'
        default:
          $ref: '#/components/responses/Error'
  /admin/profiles/{profile_id}/unsuspend:
    post:
      tags: [Admin]
      summary: Unsuspend profile and account where applicable
      operationId: adminUnsuspendProfile
      parameters:
        - $ref: '#/components/parameters/ProfileId'
      responses:
        '200':
          description: Unsuspended
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminProfile'
        default:
          $ref: '#/components/responses/Error'
  /admin/reports:
    get:
      tags: [Admin]
      summary: List reports grouped or raw
      operationId: adminListReports
      parameters:
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/ReportStatus'
        - name: grouped
          in: query
          schema:
            type: boolean
            default: true
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Report list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminReportsResponse'
        default:
          $ref: '#/components/responses/Error'
  /admin/analytics/summary:
    get:
      tags: [Admin]
      summary: Get admin analytics summary
      operationId: adminAnalyticsSummary
      responses:
        '200':
          description: Analytics summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminAnalyticsSummary'
        default:
          $ref: '#/components/responses/Error'
  /admin/exports:
    post:
      tags: [Admin]
      summary: Create admin CSV export
      operationId: adminCreateExport
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateExportRequest'
      responses:
        '202':
          description: Export accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExportJob'
        default:
          $ref: '#/components/responses/Error'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      schema:
        type: string
        maxLength: 128
    Cursor:
      name: cursor
      in: query
      required: false
      schema:
        type: string
    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 50
        default: 20
    ProfileId:
      name: profile_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    WorkCardId:
      name: work_card_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    PostId:
      name: post_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    MediaAssetId:
      name: media_asset_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    CaseId:
      name: case_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
  requestBodies:
    AdminDecision:
      required: false
      content:
        application/json:
          schema:
            type: object
            properties:
              notes_to_user:
                type: string
              internal_note:
                type: string
              reason:
                type: string
  responses:
    Error:
      description: Error response
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    UserRole:
      type: string
      enum: [business, job_worker, skilled_worker]
    CategoryType:
      type: string
      enum: [business_category, work_category, work_name, product_type, skill]
    Category:
      type: object
      required: [id, category_type, name]
      properties:
        id:
          type: string
          format: uuid
        parent_id:
          type: string
          format: uuid
          nullable: true
        category_type:
          $ref: '#/components/schemas/CategoryType'
        name:
          type: string
    CategoryListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Category'
    AccountStatus:
      type: string
      enum: [active, suspended, terminated]
    ProfileVisibilityStatus:
      type: string
      enum: [draft, public, hidden_by_user, suspended_by_admin, deleted]
    VerificationStatus:
      type: string
      enum: [unverified, pending, verified, changes_requested, rejected]
    WorkCardStatus:
      type: string
      enum: [draft, published, hidden_by_user, removed_by_admin, deleted]
    WorkNeededPostStatus:
      type: string
      enum: [draft, active, paused, closed_by_user, removed_by_admin, deleted]
    SearchTarget:
      type: string
      enum: [business, job_worker, skilled_worker]
    SavedTargetType:
      type: string
      enum: [profile, work_card, work_needed_post]
    ReportReason:
      type: string
      enum: [wrong_contact, wrong_category, inappropriate_photo, wrong_details, fake_profile, spam, other]
    ReportStatus:
      type: string
      enum: [submitted, in_review, resolved_no_action, action_taken, dismissed]
    VerificationCaseStatus:
      type: string
      enum: [pending, approved, changes_requested, rejected]
    MediaVisibility:
      type: string
      enum: [public, private_admin_only]
    MediaKind:
      type: string
      enum: [image, document]
    UploadStatus:
      type: string
      enum: [pending_upload, uploaded, processing, ready, failed, deleted]
    OtpRequest:
      type: object
      required: [mobile]
      properties:
        mobile:
          type: string
          example: '+919999999999'
    OtpRequestResponse:
      type: object
      required: [otp_request_id, message]
      properties:
        otp_request_id:
          type: string
          format: uuid
        message:
          type: string
    OtpVerifyRequest:
      type: object
      required: [mobile, otp, otp_request_id]
      properties:
        mobile:
          type: string
        otp:
          type: string
        otp_request_id:
          type: string
          format: uuid
        device:
          $ref: '#/components/schemas/DeviceInfo'
    DeviceInfo:
      type: object
      properties:
        device_id:
          type: string
        platform:
          type: string
          enum: [android]
        app_version:
          type: string
        fcm_token:
          type: string
    AuthSessionResponse:
      type: object
      required: [access_token, refresh_token, next_state]
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        next_state:
          type: string
          enum: [complete_basic_account, role_selection_required, home, account_blocked]
        user:
          $ref: '#/components/schemas/User'
    BasicAccountRequest:
      type: object
      required: [display_name, accepted_terms_version, accepted_privacy_version]
      properties:
        display_name:
          type: string
        accepted_terms_version:
          type: string
        accepted_privacy_version:
          type: string
    User:
      type: object
      required: [id, display_name, primary_mobile, account_status]
      properties:
        id:
          type: string
          format: uuid
        display_name:
          type: string
        primary_mobile:
          type: string
        account_status:
